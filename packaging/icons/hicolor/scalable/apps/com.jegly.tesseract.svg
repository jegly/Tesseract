<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2c2c"/>
      <stop offset="1" stop-color="#161616"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <g fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- 4D connectors: outer cube -> inner cube -->
    <g stroke="#8c8c8c" stroke-width="6" opacity="0.9">
      <line x1="120" y1="190" x2="208" y2="222"/>
      <line x1="320" y1="190" x2="288" y2="222"/>
      <line x1="320" y1="390" x2="288" y2="302"/>
      <line x1="120" y1="390" x2="208" y2="302"/>
      <line x1="176" y1="134" x2="230" y2="200"/>
      <line x1="376" y1="134" x2="310" y2="200"/>
      <line x1="376" y1="334" x2="310" y2="280"/>
      <line x1="176" y1="334" x2="230" y2="280"/>
    </g>

    <!-- OUTER CUBE -->
    <!-- back face (dim) -->
    <polygon points="176,134 376,134 376,334 176,334" stroke="#737373" stroke-width="9"/>
    <!-- vertical connectors front->back -->
    <g stroke="#a8a8a8" stroke-width="10">
      <line x1="120" y1="190" x2="176" y2="134"/>
      <line x1="320" y1="190" x2="376" y2="134"/>
      <line x1="320" y1="390" x2="376" y2="334"/>
      <line x1="120" y1="390" x2="176" y2="334"/>
    </g>
    <!-- front face (bright) -->
    <polygon points="120,190 320,190 320,390 120,390" stroke="#ededed" stroke-width="12"/>

    <!-- INNER CUBE -->
    <polygon points="230,200 310,200 310,280 230,280" stroke="#7d7d7d" stroke-width="6.5"/>
    <g stroke="#9c9c9c" stroke-width="7">
      <line x1="208" y1="222" x2="230" y2="200"/>
      <line x1="288" y1="222" x2="310" y2="200"/>
      <line x1="288" y1="302" x2="310" y2="280"/>
      <line x1="208" y1="302" x2="230" y2="280"/>
    </g>
    <polygon points="208,222 288,222 288,302 208,302" stroke="#dcdcdc" stroke-width="8"/>
  </g>

  <!-- front-face vertices -->
  <g fill="#f4f4f4">
    <circle cx="120" cy="190" r="8"/><circle cx="320" cy="190" r="8"/>
    <circle cx="320" cy="390" r="8"/><circle cx="120" cy="390" r="8"/>
  </g>
</svg>
